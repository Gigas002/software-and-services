# See: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
# Variable substitution: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/#variable-substitution

$font = NotoSans Nerd Font

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true

    bezier = linear, 1, 1, 0, 0
    bezier = snap, 0.34, 1.56, 0.64, 1
    bezier = soft, 0.05, 0.9, 0.1, 1.05

    animation = fadeIn, 1, 5, soft
    animation = fadeOut, 1, 4, linear
    animation = inputFieldDots, 1, 3, snap
    animation = inputFieldColors, 1, 4, soft
    animation = inputFieldFade, 1, 3, linear
}

background {
    path = screenshot
    blur_passes = 3
    blur_size = 7
    # #161925ff
    color = rgba(161925ff)
}

input-field {
    size = 22%, 5.5%
    outline_thickness = 3
    rounding = 12

    # #c74dedee
    # #ed254eee
    outer_color = rgba(c74dedee) rgba(ed254eee) 45deg
    # #161925e6
    inner_color = rgba(161925e6)
    # #c3c7c8ff
    font_color = rgba(c3c7c8ff)
    # #00c1e4ee
    # #7cb7ffee
    check_color = rgba(00c1e4ee) rgba(7cb7ffee) 120deg
    # #ed254eee
    # #c74dedcc
    fail_color = rgba(ed254eee) rgba(c74dedcc) 35deg

    font_family = $font
    placeholder_text = Password for $USER…
    fail_text = $FAIL ($ATTEMPTS)

    fade_on_empty = true
    fade_timeout = 1500

    position = 0, -100
    halign = center
    valign = center
}

# Time (built-in; respects TZ)
label {
    text = $TIME
    # #c3c7c8ff
    color = rgba(c3c7c8ff)
    font_size = 150
    font_family = $font
    halign = center
    valign = top
}

# Date (updates once per minute)
label {
    text = cmd[update:60000] date +"%A, %d.%m.%Y"
    # #c3c7c8ff
    color = rgba(c3c7c8ff)
    font_size = 80
    font_family = $font
    position = 0, -300
    halign = center
    valign = top
}

# Who + keyboard layout
label {
    text = <span weight="600">$DESC</span> · $LAYOUT
    # #c3c7c8dd
    color = rgba(c3c7c8dd)
    font_size = 22
    font_family = $font
    position = 0, 130
    halign = center
    valign = center
}

# Now playing or Hyprland splash
label {
    text = cmd[update:1000] echo "$(playerctl metadata --format '{{title}} // {{artist}}' || hyprctl splash)"
    # #c3c7c8ff
    color = rgba(c3c7c8ff)
    font_size = 18
    font_family = $font
    halign = center
    valign = bottom
}
